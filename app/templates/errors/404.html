{% extends "base.html" %}

{% block content %}
<style>
    .error-container {
        min-height: 60vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .error-card {
        background-color: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        max-width: 500px;
        width: 100%;
        text-align: center;
        padding: 3rem 2rem;
    }
    .error-icon {
        font-size: 5rem;
        color: #38bdf8; /* Cyan/Cyber Blue */
        margin-bottom: 1.5rem;
        display: inline-block;
        filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.4));
    }
    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }
    .animate-float {
        animation: float 4s ease-in-out infinite;
    }
</style>

<div class="error-container">
    <div class="error-card">
        <div class="error-icon animate-float">
            <i class="bi bi-shield-exclamation"></i>
        </div>
        <h1 class="display-5 fw-bold text-white mb-2">Sınır İhlali</h1>
        <h2 class="h5 text-muted mb-4">Hata Kodu: 404 - Sayfa Bulunamadı</h2>
        <p class="text-secondary mb-4" style="line-height: 1.6;">
            Talep ettiğiniz güvenli bölge koordinatları SafeZone veri tabanında bulunamadı. Lütfen kilitli simülasyon alanına geri dönün.
        </p>
        <div class="d-grid">
            <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg rounded-pill shadow-sm d-inline-flex align-items-center justify-content-center gap-2">
                <i class="bi bi-shield-check-fill text-dark"></i>
                Güvenli Bölgeye Dön (Ana Sayfa)
            </a>
        </div>
    </div>
</div>
{% endblock %}
